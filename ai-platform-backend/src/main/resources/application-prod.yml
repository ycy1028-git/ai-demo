server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000

spring:
  application:
    name: ai-platform

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_platform}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 5000ms

  elasticsearch:
    uris: ${ES_HOST:localhost:9200}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

elasticsearch:
  index-prefix: kb_
  vector-dimension: 1024
  shards: 3
  replicas: 1

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ai-platform
  secure: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer

# 跨域配置
cors:
  allow-all-origins: false
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

ai:
  embedding:
    model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
    dimension: 1024
  llm:
    api-url: ${AI_LLM_API_URL:http://localhost:8000/v1/chat/completions}
    api-key: ${AI_LLM_API_KEY}
    model: ${AI_LLM_MODEL:qwen2.5-7b-instruct}
    timeout: 120000

logging:
  level:
    com.aip: info
    org.springframework: warn
  file:
    name: ${LOG_PATH:/var/log/ai-platform}/application.log
    max-size: 100MB
    max-history: 30

# OpenAPI 配置
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 自定义应用配置
aip:
  server:
    url: ${AIP_SERVER_URL:http://localhost:8080}
