server:
  port: 8080

spring:
  application:
    name: ai-platform

  datasource:
    url: jdbc:mysql://localhost:3306/ai_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  elasticsearch:
    uris: http://localhost:9200

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

elasticsearch:
  index-prefix: kb_
  vector-dimension: 1024
  shards: 1
  replicas: 0

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: ai-platform
  secure: false

jwt:
  secret: ${JWT_SECRET:AiPlatformSecretKey2024ForJWTTokenGenerationMustBeLongEnough}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# 跨域配置
cors:
  allow-all-origins: false
  allowed-origins: http://localhost:3000,http://localhost:8080

ai:
  embedding:
    model: text-embedding-v4
    dimension: 1024
  llm:
    api-url: http://localhost:8000/v1/chat/completions
    api-key: dummy-key
    model: qwen2.5-7b-instruct
    timeout: 120000

logging:
  level:
    com.aip: debug
    org.springframework: info

# OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# 自定义应用配置
aip:
  server:
    url: http://localhost:8080
